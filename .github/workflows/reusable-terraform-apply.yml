name: Reusable workflow to apply Terraform

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub environment"
        type: string
        required: true
      working-directory:
        description: "Working directory"
        type: string
        required: true
      tfbackend-project:
        description: "Terraform backend project"
        type: string
        required: true
      custom-commands:
        description: "Optional shell commands to run before apply"
        type: string
        required: false
        default: ""
      terraform-var-flags:
        description: 'Extra -var "key=value" flags (space separated)'
        type: string
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    services:
      tfbackend:
        image: devprofr/terraform-backend-mongodb:latest
        env:
          Application__IsHttpsRedirectionEnabled: false
          ConnectionStrings__MongoDb: ${{ secrets.TFBACKEND_CONNSTRING }}
          MongoDb__ConnectionStringName: MongoDb
          MongoDb__DatabaseName: ${{ secrets.TFBACKEND_DBNAME }}
        ports:
          - 8080:8080
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Add runner ID to MongoDB Atlas
        uses: devpro/github-workflow-parts/actions/mongodb-atlas/add-runner-ip@feature/reuse-workflows
        with:
          atlas_publickey: ${{ secrets.ATLAS_PUBLIC_KEY }}
          atlas_privatekey: ${{ secrets.ATLAS_PRIVATE_KEY }}
          atlas_groupid: ${{ secrets.ATLAS_GROUP_ID }}
          github_runid: ${{ github.run_id }}
      - name: Set TF variables from branch
        run: |
          tfbackendurl="http://localhost:8080/${{ secrets.TFBACKEND_TENANT }}/state/${{ inputs.tfbackend-project }}"
          echo "TF_HTTP_ADDRESS=$tfbackendurl" >> "$GITHUB_ENV"
          echo "TF_HTTP_LOCK_ADDRESS=$tfbackendurl/lock" >> "$GITHUB_ENV"
          echo "TF_HTTP_UNLOCK_ADDRESS=$tfbackendurl/lock" >> "$GITHUB_ENV"
      - name: Run optional custom commands
        if: ${{ inputs.custom-commands != '' }}
        run: |
          ${{ inputs.custom-commands }}
      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
          key: terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
      - name: Install terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform init
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        run: terraform plan -out=plan.tfplan
      - name: Terraform apply
        run: terraform apply -auto-approve plan.tfplan${{ inputs.terraform-var-flags }}
    env:
      ARM_CLIENT_ID: "${{ secrets.ARM_CLIENT_ID }}"
      ARM_CLIENT_SECRET: "${{ secrets.ARM_CLIENT_SECRET }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.ARM_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.ARM_TENANT_ID }}"
      TF_HTTP_USERNAME: "${{ secrets.TFBACKEND_USERNAME }}"
      TF_HTTP_PASSWORD: "${{ secrets.TFBACKEND_USERPWD }}"
