name: Reusable - .NET validate

on:
  workflow_call:
    inputs:
      job-name:
        description: Job name
        type: string
        required: false
        default: Validate
      working-directory:
        description: Working directory
        type: string
        required: false
        default: "."
      operating-system:
        description: Operating system executing the runner
        type: string
        required: false
        default: ubuntu-latest
      workflow-parts-version:
        description: GitHub workflow parts version (branch/tag/SHA)
        type: string
        required: false
        default: main
      dotnet-version:
        description: .NET version
        type: string
        default: "10.0"
      extra-vars:
        description: "Additional environment variables at the start of the pipeline"
        type: string
        required: false
        default: ""
      mongodb-enabled:
        description: Start MongoDB for integration tests?
        type: boolean
        required: false
        default: false
      sonar-enabled:
        description: Enable check done by Sonar (SonarQube or SonarCloud)
        type: boolean
        required: false
        default: false
      sonar_host_url:
        description: Sonar host URL
        type: string
        required: false
        default: "https://sonarcloud.io"
      sonar_organization:
        description: Sonar organization
        type: string
        required: false
        default: ""
      sonar_project_name:
        description: Sonar project name
        type: string
        required: false
        default: ""
      sonar_project_key:
        description: Sonar project key
        type: string
        required: false
        default: ""
      sonar_token:
        description: Sonar token for login
        type: string
        required: false
        default: ""
      fossa-enabled:
        description: Enable license compliance with FOSSA
        type: boolean
        required: false
        default: false
      fossa-api-key:
        description: FOSSA API KEY
        type: string
        required: false
        default: ""

jobs:
  dotnet-validate:
    name: ${{ inputs.job-name }}
    runs-on: ${{ inputs.operating-system }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Set additional variables
        run: |
          if [[ -z "${{ secrets.extra-vars }}" ]]; then
            echo "No extra-vars provided - skipping"
          else
            echo "${{ secrets.extra-vars }}" >> "$GITHUB_ENV"
          fi
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Checkout workflow parts
        uses: actions/checkout@v6
        with:
          repository: devpro/github-workflow-parts
          ref: ${{ inputs.workflow-parts-version }}
          path: workflow-parts
      - name: Install & lint .NET
        uses: ./workflow-parts/dotnet/install-lint-restore
        with:
          dotnet-version: ${{ dotnet-version }}
      - name: Start MongoDB
        if: ${{ inputs.mongodb-enabled }}
        uses: ./workflow-parts/mongodb/start
      - name: Build & test .NET
        if: ${{ ! inputs.sonar-enabled }}
        uses: ./workflow-parts/dotnet/build-test
      - name: Build, lint & test
        if: ${{ inputs.sonar-enabled }}
        uses: ./workflow-parts/dotnet/build-test-sonar
        with:
          sonar_organization: ${{ inputs.sonar_organization }}
          sonar_host_url: ${{ inputs.sonar_host_url }}
          sonar_project_name: ${{ inputs.sonar_project_name }}
          sonar_project_key: ${{ inputs.sonar_project_key }}
          sonar_token: ${{ inputs.sonar_token }}
      - name: License Compliance with FOSSA
        if: ${{ inputs.fossa-enabled }}
        uses: fossas/fossa-action@v1
        with:
          api-key: "${{ inputs.fossa-api-key }}"
          run-tests: false
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        # with:
        #   path: . # Or Dockerfile path
        #   format: spdx-json # Or cyclonedx-json
        #   output-file: sbom.json
        #   upload-artifact: true # Auto-upload to workflow artifacts
      - name: Archive test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: |
            ./**/*test-result.xml
            ./test/*/TestResults/*/coverage.cobertura.xml
            ./**/SonarQube.xml
            ./**/Summary.txt

